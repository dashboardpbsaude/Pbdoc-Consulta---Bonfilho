<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Destinatários</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between">

<h3>Destinatários WhatsApp</h3>

<a href="/consulta" class="btn btn-secondary">
Voltar
</a>

</div>

<div class="card mt-3">

<div class="card-body">

<form method="post"

{% if editar %}

action="/atualizar_destinatario"

{% else %}

action="/salvar_destinatario"

{% endif %}

>

{% if editar %}

<input type="hidden" name="id" value="{{editar[0]}}">

{% endif %}

<div class="row">

<div class="col">

<label>Nome</label>

<input
name="nome"
class="form-control"
required
value="{{editar[1] if editar else ''}}">

</div>

<div class="col">

<label>Setor</label>

<input
name="setor"
class="form-control"
required
value="{{editar[2] if editar else ''}}">

</div>

<div class="col">

<label>WhatsApp</label>

<input
name="whatsapp"
class="form-control"
required
placeholder="558399999999"
value="{{editar[3] if editar else ''}}">

</div>

<div class="col">

<label>&nbsp;</label>

<button class="btn btn-success w-100">

{% if editar %}
Atualizar
{% else %}
Salvar
{% endif %}

</button>

</div>

</div>

</form>

</div>

</div>

<table class="table table-bordered mt-4">

<thead class="table-dark">

<tr>

<th>Nome</th>

<th>Setor</th>

<th>WhatsApp</th>

<th width="150">Ações</th>

</tr>

</thead>

<tbody>

{% for d in dados %}

<tr>

<td>{{d[1]}}</td>

<td>{{d[2]}}</td>

<td>{{d[3]}}</td>

<td>

<a
href="/editar_destinatario/{{d[0]}}"
class="btn btn-warning btn-sm">

Editar

</a>

<a
href="/excluir_destinatario/{{d[0]}}"
class="btn btn-danger btn-sm">

Excluir

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
