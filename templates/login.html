<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Login - Consulta PBdoc</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        footer {
            font-size: 0.85rem;
            color: #666;
        }
    </style>

</head>

<body class="bg-light">

    <div class="container mt-4">

        <div class="text-center mb-4">

            <img src="{{ url_for('static', filename='LogoPBSAUDE.png') }}" style="max-height:90px">

            <h3 class="mt-3"><strong>Consulta de Processos PBdoc</strong></h3>

        </div>

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white text-center">
                        Acesso ao Sistema
                    </div>

                    <div class="card-body">

                        <form method="POST" action="/entrar">

                            <div class="mb-3">

                                <label class="form-label">E-mail institucional</label>

                                <input type="email" name="email" class="form-control"
                                    placeholder="seuemail@pbsaude.pb.gov.br" required>

                            </div>

                            <div class="d-grid">

                                <button class="btn btn-success">
                                    Entrar
                                </button>

                            </div>

                        </form>

                        {% if erro %}
                            <div class="alert alert-danger py-2 mt-3" style="font-size: 0.9rem;">
                                {{ erro }}
                            </div>
                        {% endif %}
                    </div>

                </div>

            </div>

        </div>

        <footer class="text-center mt-5">

            <div>© 2026 Fundação Paraibana de Gestão em Saúde - PB Saúde</div>

            <div>Desenvolvimento - Gerência Executiva de Ciência, Inovação e Incorporação Tecnológica em Saúde</div>

        </footer>

    </div>

</body>

</html>
